vcenter:
  server: vcsa01.example.local

vmware:
  folder: TALOS
  locations:
    mylocation:
      datastore: your-datastore
      cluster: your-cluster
      portgroup: your-portgroup

library:
  name: TALOS

schematic:
  id: your-schematic-id-from-factory.talos.dev
  version: v1.13.2

cluster:
  name: my-cluster
  network:
    gateway: 10.13.37.1
    nameservers:
      - 10.13.37.1
    subnetPrefix: 24

  controlplane:
    cpu: 4
    memoryGB: 8
    diskGB: 50   # optional: grows the OVA OS disk; omit to keep template size (grow-only)
    configPath: talosfiles/controlplane.yaml
    nodes:
      - hostname: talos-cp-1
        ip: 10.13.37.11
        location: mylocation
      - hostname: talos-cp-2
        ip: 10.13.37.12
        location: mylocation
      - hostname: talos-cp-3
        ip: 10.13.37.13
        location: mylocation

  worker:
    cpu: 6
    memoryGB: 12
    diskGB: 40   # optional: OS disk (/dev/sda); datadisks below become /dev/sdb, /dev/sdc, ...
    storage:
      datadisks:
        - sizeGB: 200
          mountpoint: /var/lib/longhorn
    configPath: talosfiles/worker.yaml
    nodes:
      - hostname: talos-worker-1
        ip: 10.13.37.21
        location: mylocation
      - hostname: talos-worker-2
        ip: 10.13.37.22
        location: mylocation
      - hostname: talos-worker-3
        ip: 10.13.37.23
        location: mylocation

talos:
  vip: 10.13.37.10
  talosConfigPath: talosfiles/talosconfig
  kubeconfigPath: talosfiles/kubeconfig
