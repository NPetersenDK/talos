# Copy this file to your talos-configs repo as environment.yaml and fill in all <PLACEHOLDER> values.

vcenter:
  # Hostname or IP of your vCenter Server
  server: <VCENTER_HOSTNAME>

vmware:
  # VM inventory folder name (will be created if it doesn't exist)
  folder: <VM_FOLDER_NAME>
  # Define one or more location keys. Each key maps to a vSphere cluster/datastore/portgroup.
  # Reference these keys in node entries below via the 'location' field.
  locations:
    primary:
      datastore: <VSPHERE_DATASTORE_NAME>
      cluster: <VSPHERE_CLUSTER_NAME>
      portgroup: <VSPHERE_PORTGROUP_NAME>

library:
  # vSphere Content Library name where the Talos OVA will be stored
  name: <CONTENT_LIBRARY_NAME>

schematic:
  # Talos Image Factory schematic ID — generate at https://factory.talos.dev
  id: <SCHEMATIC_ID>
  # Talos version to deploy (e.g. v1.13.2)
  version: <TALOS_VERSION>

cluster:
  network:
    # Default gateway for all nodes
    gateway: <GATEWAY_IP>
    # DNS servers
    nameservers:
      - <DNS_IP>
    # Subnet prefix length (e.g. 24 for /24)
    subnetPrefix: 24

  controlplane:
    cpu: 4
    memoryGB: 8
    diskGB: 50
    # Path to controlplane.yaml — relative to ConfigsPath (talos-configs root)
    configPath: controlplane.yaml
    nodes:
      - hostname: talos-cp-1
        ip: <CP1_IP>
        location: primary
      - hostname: talos-cp-2
        ip: <CP2_IP>
        location: primary
      - hostname: talos-cp-3
        ip: <CP3_IP>
        location: primary

  worker:
    cpu: 4
    memoryGB: 8
    diskGB: 100
    # Path to worker.yaml — relative to ConfigsPath (talos-configs root)
    configPath: worker.yaml
    nodes:
      - hostname: talos-worker-1
        ip: <WORKER1_IP>
        location: primary
      - hostname: talos-worker-2
        ip: <WORKER2_IP>
        location: primary
      - hostname: talos-worker-3
        ip: <WORKER3_IP>
        location: primary

talos:
  # Virtual IP for the Kubernetes API server (must be in the same subnet)
  vip: <VIP_IP>
  # Paths relative to ConfigsPath (talos-configs root)
  talosConfigPath: talosconfig
  kubeconfigPath: kubeconfig
